name: "Heal Sentinel"
description: "AI code reviewer that refuses praise"
inputs:
  severity_floor:
    description: "medium | high | critical"
    default: "medium"
  block_merge_on_critical:
    description: "true | false"
    default: "true"
  llm_api_key:
    description: "Anthropic API key"
    required: true
runs:
  using: "composite"
  steps:
    - name: Compute diff
      shell: bash
      run: git diff "${{ github.event.pull_request.base.sha }}"...HEAD > /tmp/pr.diff
    - name: Install Heal Sentinel
      shell: bash
      run: npm install -g tfb-heal-sentinel
    - name: Run analysis
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.llm_api_key }}
      run: tfb-heal-sentinel /tmp/pr.diff --json --severity-floor "${{ inputs.severity_floor }}" > /tmp/tfb-heal-sentinel-report.json
    - name: Post PR comment
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('/tmp/tfb-heal-sentinel-report.json', 'utf8'));
          const body = [
            `## Heal Sentinel - ${report.metrics.n_findings} finding(s), ${report.verdict}`,
            '',
            ...report.findings.map((finding) => [
              `### [${finding.severity.toUpperCase()}] [${finding.rule}] \`${finding.file}:${finding.line}\``,
              '',
              '```text',
              finding.snippet,
              '```',
              '',
              `**Doctrine:** ${finding.doctrine}`,
              '',
              `**Riverbed:** ${finding.riverbed}`,
              '',
              `**Heal:** ${finding.heal_shape}`,
              ''
            ].join('\n')),
            'To accept a bypass with a named fallback contract:',
            '',
            '```text',
            'heal-sentinel: bypass-accepted <finding-id-or-rule> reason: <one sentence>',
            '```'
          ].join('\n');
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body
          });
    - name: Enforce critical findings
      shell: bash
      run: |
        node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('/tmp/tfb-heal-sentinel-report.json','utf8')); const critical=r.findings.filter(f=>f.severity==='critical'&&!f.named_fallback_accepted).length; if ('${{ inputs.block_merge_on_critical }}' === 'true' && critical) process.exit(1)"
